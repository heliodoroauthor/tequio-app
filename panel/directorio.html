<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Directorio 32 Estados | Tequio</title>
<script>
(function(){
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded');
    var style = document.createElement('style');
    style.textContent = '.embedded a[href="/"], .embedded a[href="../"], .embedded .back-link, .embedded header > a:first-child { display:none !important; }';
    document.head.appendChild(style);
  }
})();
</script>
<style>
  :root{
    --bg:#0b0f1a;
    --bg-2:#111827;
    --card:#1a2030;
    --card-2:#202738;
    --line:#2a3145;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --gold:#fbbf24;
    --gold-2:#f59e0b;
    --green:#10b981;
    --red:#ef4444;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  a:hover{text-decoration:underline}
  header{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line);background:rgba(11,15,26,.85);position:sticky;top:0;z-index:5;backdrop-filter:blur(8px)}
  header .back-link{color:var(--muted);font-size:14px}
  header .titles{display:flex;flex-direction:column}
  header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:13px;margin-top:2px}
  main{max-width:1200px;margin:0 auto;padding:22px}
  .grid-estados{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:14px}
  .card-estado{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:.15s ease;display:flex;flex-direction:column;gap:8px}
  .card-estado:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(251,191,36,.08)}
  .clave-badge{display:inline-block;background:var(--gold);color:#0b0f1a;font-weight:700;font-size:12px;padding:3px 10px;border-radius:20px;width:max-content;letter-spacing:.5px}
  .card-estado .nombre{font-size:17px;font-weight:600}
  .card-estado .hint{color:var(--muted);font-size:13px;margin-top:auto}
  .hero{background:linear-gradient(135deg,var(--card) 0%,var(--card-2) 100%);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:22px}
  .hero-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .hero h2{margin:0;font-size:26px;font-weight:700}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
  .stat{background:rgba(0,0,0,.25);padding:14px;border-radius:10px;border:1px solid var(--line)}
  .stat .n{font-size:28px;font-weight:700;color:var(--gold)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  section{margin:26px 0}
  section h3{font-size:18px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  section h3 .count{color:var(--muted);font-weight:400;font-size:14px}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .person-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;gap:12px}
  .person-card .photo{flex:0 0 56px;height:56px;border-radius:50%;background:var(--card-2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700;border:1px solid var(--line)}
  .person-card .photo img{width:100%;height:100%;object-fit:cover}
  .person-card .meta{flex:1;min-width:0}
  .person-card .nombre{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:4px;word-break:break-word}
  .person-card .partido{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--card-2);color:var(--gold);font-weight:600;letter-spacing:.3px}
  .person-card .detail{color:var(--muted);font-size:12px;margin-top:6px}
  .person-card a{font-size:12px}
  .table-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .toolbar{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px;background:var(--bg-2);border:1px solid var(--line);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
  .toolbar input:focus{border-color:var(--gold)}
  .toolbar .count-info{color:var(--muted);font-size:13px}
  .tabla{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--card-2);color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.4px;position:sticky;top:0}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(251,191,36,.04)}
  td .municipio{font-weight:600;color:var(--text)}
  td .presidente{color:var(--text)}
  td .partido-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:var(--card-2);color:var(--gold);font-weight:600;letter-spacing:.3px}
  td a{font-size:12px}
  td a.tel{color:var(--green);font-weight:600;white-space:nowrap}
  .empty{text-align:center;padding:30px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:10px}
  .note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);color:#bfdbfe;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
  .note strong{color:#dbeafe}
  .back-btn{display:inline-block;margin-top:18px;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;padding:10px 14px;border:1px solid var(--line);border-radius:8px;background:var(--card);transition:.15s}
  .back-btn:hover{border-color:var(--gold)}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .disclaimer{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;text-align:center}
  @media (max-width:640px){
    main{padding:14px}
    header{padding:14px}
    header h1{font-size:17px}
    header .sub{font-size:12px}
    .hero{padding:16px}
    .hero h2{font-size:20px}
    .stat .n{font-size:22px}
    th,td{padding:8px 10px;font-size:12px}
  }
</style>
</head>
<body>
<header>
  <a href="/" class="back-link">&larr; Tequio</a>
  <div class="titles">
    <h1>Directorio 32 Estados</h1>
    <div class="sub">Teléfonos, direcciones y contactos oficiales de gobiernos estatales y municipales</div>
  </div>
</header>
<main id="app">
  <div class="loading">Cargando&hellip;</div>
</main>

<script>
const ESTADOS = {
  "01":"Aguascalientes","02":"Baja California","03":"Baja California Sur","04":"Campeche",
  "05":"Coahuila","06":"Colima","07":"Chiapas","08":"Chihuahua","09":"Ciudad de México",
  "10":"Durango","11":"Guanajuato","12":"Guerrero","13":"Hidalgo","14":"Jalisco",
  "15":"Estado de México","16":"Michoacán","17":"Morelos","18":"Nayarit","19":"Nuevo León",
  "20":"Oaxaca","21":"Puebla","22":"Querétaro","23":"Quintana Roo","24":"San Luis Potosí",
  "25":"Sinaloa","26":"Sonora","27":"Tabasco","28":"Tamaulipas","29":"Tlaxcala",
  "30":"Veracruz","31":"Yucatán","32":"Zacatecas"
};

const params = new URLSearchParams(location.search);
const embedded = params.get('embedded') === '1';
const claveParam = params.get('clave');
const app = document.getElementById('app');

function esc(s){
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function buildHref(clave){
  const q = new URLSearchParams();
  q.set('clave', clave);
  if (embedded) q.set('embedded','1');
  return '?' + q.toString();
}

function renderLanding(){
  const cards = Object.entries(ESTADOS).map(([clave, nombre]) =>
    `<a class="card-estado" href="${esc(buildHref(clave))}">
      <span class="clave-badge">${esc(clave)}</span>
      <div class="nombre">${esc(nombre)}</div>
      <div class="hint">Ver directorio &rarr;</div>
    </a>`
  ).join('');
  app.innerHTML = `
    <p style="color:var(--muted);font-size:14px;margin:6px 0 4px">Selecciona un estado para ver presidentes municipales, diputados federales y senadores con sus teléfonos y direcciones oficiales.</p>
    <div class="grid-estados">${cards}</div>
    <div class="disclaimer">Datos oficiales: INAFED (datos.gob.mx) y Camara de Diputados.</div>
  `;
}

function fullName(p){
  return [p.nombre, p.apellido_paterno, p.apellido_materno].filter(Boolean).join(' ').trim();
}

function telLink(lada, tel){
  const t = (tel || '').toString().trim();
  if (!t) return '<span style="color:var(--muted)">&mdash;</span>';
  const ladaC = (lada || '').toString().trim();
  const num = (ladaC ? ladaC + t : t).replace(/\D/g,'');
  const disp = ladaC ? `(${ladaC}) ${t}` : t;
  return `<a class="tel" href="tel:+52${num}">${esc(disp)}</a>`;
}

function webLink(url){
  if (!url || !url.trim()) return '<span style="color:var(--muted)">&mdash;</span>';
  const u = url.trim();
  const href = /^https?:\/\//i.test(u) ? u : 'https://' + u;
  return `<a href="${esc(href)}" target="_blank" rel="noopener">Sitio &nearr;</a>`;
}

function renderSenadorCard(s){
  const photo = s.foto_url
    ? `<img src="${esc(s.foto_url)}" alt="">`
    : (s.nombre_completo || '?').substring(0,1);
  return `<div class="person-card">
    <div class="photo">${s.foto_url ? photo : esc(photo)}</div>
    <div class="meta">
      <div class="nombre">${esc(s.nombre_completo || '')}</div>
      ${s.partido ? `<span class="partido">${esc(s.partido)}</span>` : ''}
      ${s.tipo_eleccion ? `<div class="detail">${esc(s.tipo_eleccion)}</div>` : ''}
      ${s.telefono ? `<div class="detail">Tel: <a class="tel" href="tel:${esc(s.telefono)}">${esc(s.telefono)}</a></div>` : ''}
      ${s.direccion_oficina ? `<div class="detail">${esc(s.direccion_oficina)}</div>` : ''}
      ${s.email ? `<div class="detail"><a href="mailto:${esc(s.email)}">${esc(s.email)}</a></div>` : ''}
    </div>
  </div>`;
}

function renderDiputadoCard(d){
  const photo = d.foto_url
    ? `<img src="${esc(d.foto_url)}" alt="">`
    : esc((d.nombre || '?').substring(0,1));
  const principio = d.principio_eleccion || '';
  const principioBadge = principio ? `<span class="partido" style="margin-left:6px;background:rgba(16,185,129,.15);color:#6ee7b7">${esc(principio === 'Mayoría Relativa' ? 'MR' : principio === 'Representación Proporcional' ? 'RP' : principio)}</span>` : '';
  return `<div class="person-card">
    <div class="photo">${d.foto_url ? photo : photo}</div>
    <div class="meta">
      <div class="nombre">${esc(d.nombre || '')}</div>
      ${d.partido ? `<span class="partido">${esc(d.partido)}</span>${principioBadge}` : principioBadge}
      ${d.distrito ? `<div class="detail">Distrito ${esc(d.distrito)}</div>` : ''}
      ${d.telefono ? `<div class="detail">Tel: <a class="tel" href="tel:${esc(d.telefono)}">${esc(d.telefono)}</a></div>` : ''}
      ${d.email ? `<div class="detail"><a href="mailto:${esc(d.email)}">${esc(d.email)}</a></div>` : ''}
    </div>
  </div>`;
}

let _state = null;

function renderPresidentesTable(filter){
  if (!_state) return;
  const f = (filter || '').toLowerCase().trim();
  const filtered = _state.presidentes.filter(p => {
    if (!f) return true;
    const muni = (p.nombre_municipio || '').toLowerCase();
    const nm = fullName(p).toLowerCase();
    return muni.includes(f) || nm.includes(f);
  });
  const rows = filtered.map(p => `
    <tr>
      <td><span class="municipio">${esc(p.nombre_municipio || '')}</span></td>
      <td><span class="presidente">${esc(fullName(p))}</span></td>
      <td>${p.partido ? `<span class="partido-pill">${esc(p.partido)}</span>` : ''}</td>
      <td>${esc(p.periodo_label || '')}</td>
      <td>${telLink(p.lada, p.telefono)}</td>
      <td style="max-width:280px">${esc(p.direccion || '')}</td>
      <td>${webLink(p.pagina_web)}</td>
    </tr>
  `).join('');
  const tbody = document.getElementById('tbl-pres-body');
  const cnt = document.getElementById('pres-count');
  if (tbody) tbody.innerHTML = rows || `<tr><td colspan="7" class="empty" style="border:none">Sin coincidencias para "${esc(filter)}"</td></tr>`;
  if (cnt) cnt.textContent = `${filtered.length} de ${_state.presidentes.length}`;
}

function renderEstado(data){
  _state = data;
  const conTel = data.num_municipios_con_telefono || 0;
  const pct = data.num_municipios ? Math.round(conTel / data.num_municipios * 100) : 0;
  const nDip = (data.diputados_federales || []).length;
  const nSen = (data.senadores || []).length;

  const senadoresHTML = nSen > 0
    ? `<div class="grid-cards">${data.senadores.map(renderSenadorCard).join('')}</div>`
    : `<div class="note">Los senadores aun no estan filtrados por estado en nuestra base de datos. <strong>Issue conocido</strong> del scraper.</div>`;

  const diputadosHTML = nDip > 0
    ? `<div class="grid-cards">${data.diputados_federales.map(renderDiputadoCard).join('')}</div>`
    : `<div class="empty">Sin diputados federales registrados para este estado.</div>`;

  app.innerHTML = `
    <div class="hero">
      <div class="hero-top">
        <span class="clave-badge">${esc(data.clave)}</span>
        <h2>${esc(data.nombre_estado)}</h2>
      </div>
      <div class="stats">
        <div class="stat"><div class="n">${data.num_municipios}</div><div class="l">Presidentes municipales</div></div>
        <div class="stat"><div class="n">${nDip}</div><div class="l">Diputados federales</div></div>
        <div class="stat"><div class="n">${nSen || '&mdash;'}</div><div class="l">Senadores ${nSen ? '' : '(pendiente)'}</div></div>
        <div class="stat"><div class="n">${pct}%</div><div class="l">Con telefono verificado</div></div>
      </div>
    </div>

    <section>
      <h3>Senadores <span class="count">${nSen}</span></h3>
      ${senadoresHTML}
    </section>

    <section>
      <h3>Diputados federales <span class="count">${nDip}</span></h3>
      ${diputadosHTML}
    </section>

    <section>
      <h3>Presidentes municipales <span class="count" id="pres-count">${data.num_municipios}</span></h3>
      <div class="table-wrap">
        <div class="toolbar">
          <input id="pres-filter" placeholder="Filtrar por municipio o nombre&hellip;" autocomplete="off">
          <span class="count-info">${conTel}/${data.num_municipios} con telefono</span>
        </div>
        <div class="tabla">
          <table>
            <thead><tr>
              <th>Municipio</th><th>Presidente</th><th>Partido</th><th>Periodo</th><th>Telefono</th><th>Direccion</th><th>Web</th>
            </tr></thead>
            <tbody id="tbl-pres-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <a class="back-btn" href="${embedded ? '?embedded=1' : '?'}">&larr; Volver a los 32 estados</a>

    <div class="disclaimer">Datos oficiales de INAFED (datos.gob.mx) y Camara de Diputados.</div>
  `;

  renderPresidentesTable('');
  const filterEl = document.getElementById('pres-filter');
  if (filterEl) {
    let t;
    filterEl.addEventListener('input', e => {
      clearTimeout(t);
      t = setTimeout(() => renderPresidentesTable(e.target.value), 120);
    });
  }
}

async function loadEstado(clave){
  app.innerHTML = '<div class="loading">Cargando directorio&hellip;</div>';
  try {
    const r = await fetch(`/api/data?vista=directorio_estado&clave=${encodeURIComponent(clave)}`);
    const data = await r.json();
    if (!r.ok || data.error) {
      app.innerHTML = `<div class="empty">Error: ${esc(data.error || r.status)}</div>`;
      return;
    }
    renderEstado(data);
  } catch (e) {
    app.innerHTML = `<div class="empty">Error de red: ${esc(e.message)}</div>`;
  }
}

if (claveParam) {
  loadEstado(claveParam.padStart(2,'0'));
} else {
  renderLanding();
}
</script>

<script>
/* P0.3 — Sort estados 01 → 32 numéricamente */
(function() {
  function sortEstadosOnce() {
    const selectors = ['.estado-item', '.estado-card', '[data-cve-ent]', '[data-estado]'];
    for (const sel of selectors) {
      const container = document.querySelector('.estados-grid, .estados-list, #estados');
      if (!container) continue;
      const items = Array.from(container.querySelectorAll(sel));
      if (items.length < 2) continue;
      items.sort(function(a, b) {
        const ca = (a.dataset.cveEnt || a.dataset.estado || a.textContent.match(/\d+/) || [''])[0];
        const cb = (b.dataset.cveEnt || b.dataset.estado || b.textContent.match(/\d+/) || [''])[0];
        return parseInt(ca) - parseInt(cb);
      });
      items.forEach(function(it) { container.appendChild(it); });
      break;
    }
  }
  // Observe DOM and sort after each render
  let timer = null;
  const obs = new MutationObserver(function() {
    clearTimeout(timer);
    timer = setTimeout(sortEstadosOnce, 200);
  });
  if (document.body) obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(sortEstadosOnce, 1000);
  setTimeout(sortEstadosOnce, 3000);
})();
</script>
</body>
</html>
