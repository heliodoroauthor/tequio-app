<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria Histórica de México · Tequio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --bg-2: #111827;
    --text: #f3f4f6;
    --muted: #9ca3af;
    --soft: #d1d5db;
    --gold: #fbbf24;
    --border: rgba(255,255,255,0.1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem 1.2rem 3rem;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.5rem 0;
    margin-bottom: 0.6rem;
  }
  .back-link:hover { color: var(--gold); text-decoration: none; }
  body.embedded .back-link { display: none; }
  h1 {
    font-size: 1.8rem;
    margin: 0.4rem 0 0.3rem;
    color: var(--text);
    font-weight: 700;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 0 0 1.4rem;
    line-height: 1.55;
  }
  .quick-nav {
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    padding: 0.6rem;
    background: rgba(0,0,0,0.4);
    border-radius: 0.6rem;
    margin-bottom: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 10;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .quick-nav::-webkit-scrollbar { height: 6px; }
  .quick-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .quick-nav-btn {
    flex: 0 0 auto;
    padding: 0.5rem 0.9rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    color: var(--soft);
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
  }
  .quick-nav-btn:hover { background: rgba(251,191,36,0.15); }
  .quick-nav-btn.active {
    background: var(--gold);
    color: #111827;
    border-color: var(--gold);
    font-weight: 600;
  }
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .era-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    border-radius: 0.75rem;
    padding: 1.5rem;
    position: relative;
    scroll-margin-top: 5rem;
  }
  .era-card header {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .era-emoji {
    font-size: 2.5rem;
    line-height: 1;
  }
  .era-card h2 {
    margin: 0;
    font-size: 1.4rem;
    color: var(--text);
    font-weight: 700;
  }
  .era-periodo {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.25rem;
  }
  .era-resumen {
    color: var(--soft);
    line-height: 1.65;
    margin: 0 0 1.2rem;
    font-size: 0.95rem;
  }
  .hitos-list {
    display: grid;
    gap: 0.6rem;
  }
  .hito-item {
    display: flex;
    gap: 1rem;
    padding: 0.6rem 0.8rem;
    background: rgba(0,0,0,0.3);
    border-radius: 0.5rem;
    align-items: baseline;
  }
  .hito-anio {
    font-weight: 700;
    font-family: 'Courier New', monospace;
    min-width: 60px;
    text-align: right;
    font-size: 0.92rem;
  }
  .hito-texto {
    color: #e5e7eb;
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .loading, .empty {
    text-align: center;
    color: var(--muted);
    padding: 2.5rem 1rem;
    font-size: 0.95rem;
  }
  .footer-note {
    margin-top: 2.5rem;
    padding: 1rem 1.2rem;
    background: rgba(0,0,0,0.3);
    border-radius: 0.5rem;
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.5;
    text-align: center;
  }
  @media (max-width: 600px) {
    .wrap { padding: 0.8rem 1rem 2.5rem; }
    h1 { font-size: 1.5rem; }
    .era-card { padding: 1.1rem; }
    .era-emoji { font-size: 2rem; }
    .era-card h2 { font-size: 1.2rem; }
    .hito-anio { min-width: 52px; font-size: 0.85rem; }
    .hito-texto { font-size: 0.88rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="/">← Tequio</a>
  <h1>🏺 Memoria Histórica de México</h1>
  <p class="subtitle">10 eras desde la era prehispánica hasta la Cuarta Transformación. Eventos clave de cada época.</p>
  <nav class="quick-nav" id="quickNav" aria-label="Navegación rápida de eras"></nav>
  <div id="timeline" class="timeline">
    <div class="loading">Cargando eras…</div>
  </div>
  <p class="footer-note">Información histórica orientativa. Fuente: documentos públicos, manuales de historia oficial SEP, INAH.</p>
</div>
<script>
  (function () {
    const params = new URLSearchParams(location.search);
    if (params.get('embedded') === '1') {
      document.body.classList.add('embedded');
    }
  })();

  const escapeHTML = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

  function renderQuickNav(eras) {
    const nav = document.getElementById('quickNav');
    nav.innerHTML = eras.map(era => {
      const short = (era.titulo || era.slug || '').length > 22
        ? era.titulo.substring(0, 20) + '…'
        : (era.titulo || era.slug || '');
      return `<button class="quick-nav-btn" data-slug="${escapeHTML(era.slug)}" type="button">${escapeHTML(era.emoji || '')} ${escapeHTML(short)}</button>`;
    }).join('');
    nav.querySelectorAll('.quick-nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const slug = btn.getAttribute('data-slug');
        const target = document.getElementById('era-' + slug);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  function renderTimeline(eras) {
    const container = document.getElementById('timeline');
    if (!eras || !eras.length) {
      container.innerHTML = '<div class="empty">No hay eras disponibles.</div>';
      return;
    }
    container.innerHTML = eras.map(era => {
      const color = era.color || '#fbbf24';
      const hitos = (era.hitos || []).map(h => `
        <div class="hito-item">
          <div class="hito-anio" style="color:${escapeHTML(color)}">${escapeHTML(h.anio)}</div>
          <div class="hito-texto">${escapeHTML(h.hito)}</div>
        </div>
      `).join('');
      return `
        <article id="era-${escapeHTML(era.slug)}" class="era-card" data-slug="${escapeHTML(era.slug)}" style="border-left-color:${escapeHTML(color)}">
          <header>
            <div class="era-emoji">${escapeHTML(era.emoji || '')}</div>
            <div>
              <h2>${escapeHTML(era.titulo || '')}</h2>
              <div class="era-periodo">${escapeHTML(era.periodo || '')}</div>
            </div>
          </header>
          <p class="era-resumen">${escapeHTML(era.resumen || '')}</p>
          ${hitos ? `<div class="hitos-list">${hitos}</div>` : ''}
        </article>
      `;
    }).join('');
    setupScrollSpy();
  }

  function setupScrollSpy() {
    const cards = document.querySelectorAll('.era-card');
    const btns = document.querySelectorAll('.quick-nav-btn');
    if (!('IntersectionObserver' in window) || !cards.length) return;
    const bySlug = {};
    btns.forEach(b => { bySlug[b.getAttribute('data-slug')] = b; });
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const slug = entry.target.getAttribute('data-slug');
          btns.forEach(b => b.classList.remove('active'));
          if (bySlug[slug]) {
            bySlug[slug].classList.add('active');
            bySlug[slug].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        }
      });
    }, { rootMargin: '-30% 0px -55% 0px', threshold: 0 });
    cards.forEach(c => observer.observe(c));
  }

  async function loadEras() {
    try {
      const r = await fetch('/api/data?vista=eras_historicas');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const items = data.items || [];
      renderQuickNav(items);
      renderTimeline(items);
    } catch (err) {
      document.getElementById('timeline').innerHTML =
        '<div class="empty">No se pudieron cargar las eras. ' + escapeHTML(err.message) + '</div>';
    }
  }

  loadEras();
</script>
</body>
</html>
