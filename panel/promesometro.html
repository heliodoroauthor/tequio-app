<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5" />
<title>Compromisos Públicos · Tequio</title>
<link rel="icon" href="/fav32.png">
<style>
  :root{
    --bg:#0b0f1a;--surface:#11172a;--surface2:#1a1f2e;--border:#2a3142;
    --text:#e5e7eb;--text2:#b1bdd0;--text3:#7a8696;
    --gold:#fbbf24;--accent:#3b82f6;--accent2:#a855f7;
    --green:#22c55e;--red:#ef4444;--orange:#f97316;--yellow:#eab308;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font:14px/1.5 'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 80px}
  body.embedded .back{display:none!important}
  .back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;margin:6px 0 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);text-decoration:none;font-size:13px}
  .back:hover{color:var(--gold)}
  
  .hero{background:linear-gradient(135deg,#0f766e 0%,#0d9488 50%,#14b8a6 100%);border-radius:20px;padding:28px;margin-bottom:18px;color:#fff;box-shadow:0 8px 24px rgba(20,184,166,0.30)}
  .hero h1{font-size:30px;font-weight:800;margin:0 0 6px;line-height:1.1}
  .hero p{margin:0;opacity:0.94;font-size:14px;line-height:1.5}
  .hero-header{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:14px}
  .hero-link{background:rgba(255,255,255,0.18);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,0.25)}
  .hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:14px;background:rgba(255,255,255,0.10);border-radius:12px;backdrop-filter:blur(10px)}
  .hero-stat{text-align:center}
  .hero-stat .num{font-size:22px;font-weight:800;line-height:1.1}
  .hero-stat .lbl{font-size:10px;opacity:0.85;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
  
  /* Termómetro principal */
  .termometro{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
  .term-title{font-size:13px;color:var(--text3);font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px}
  .term-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;background:rgba(0,0,0,0.30)}
  .term-segment{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.4);transition:width 0.5s}
  .term-segment.cumplida{background:#22c55e}
  .term-segment.parcial{background:#eab308}
  .term-segment.en-curso{background:#3b82f6}
  .term-segment.pendiente{background:#6b7280}
  .term-segment.rota{background:#ef4444}
  .term-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;font-size:11px}
  .term-legend-item{display:flex;align-items:center;gap:6px}
  .term-legend-item span.dot{width:12px;height:12px;border-radius:3px}
  
  /* Sello */
  .sello{background:linear-gradient(90deg,rgba(34,197,94,0.10),rgba(34,197,94,0.04));border:1px solid rgba(34,197,94,0.35);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .sello .lbl{font-size:11px;font-weight:700;color:#22c55e;letter-spacing:0.5px}
  
  /* Educativa */
  details.educ{background:linear-gradient(135deg,rgba(168,85,247,0.10),rgba(168,85,247,0.04));border:1px solid rgba(168,85,247,0.35);border-radius:12px;margin-bottom:14px}
  details.educ summary{cursor:pointer;padding:12px 16px;font-size:13px;font-weight:700;color:#a855f7;list-style:none;display:flex;justify-content:space-between;align-items:center}
  details.educ summary::-webkit-details-marker{display:none}
  details.educ .body{padding:0 16px 14px;font-size:12px;color:var(--text2);line-height:1.6}
  details.educ ul{margin:6px 0 6px 20px}
  
  /* Filters */
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
  .chip:hover{border-color:var(--accent);color:var(--text)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  
  details.notf{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0;margin-bottom:8px}
  details.notf summary{cursor:pointer;padding:10px 14px;font-size:13px;color:var(--text2);font-weight:600;list-style:none;display:flex;align-items:center;justify-content:space-between}
  details.notf summary::-webkit-details-marker{display:none}
  details.notf summary::after{content:'▾';font-size:12px;color:var(--text3);transition:transform 0.15s}
  details.notf[open] summary::after{transform:rotate(180deg)}
  details.notf .filter-body{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border)}
  .active-tag{background:var(--accent);color:#fff;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;margin-left:auto;margin-right:6px}
  
  /* Promesa card */
  .promesa{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;border-left:4px solid var(--accent);transition:transform 0.15s}
  .promesa:hover{transform:translateX(2px);border-left-width:5px}
  .promesa.cumplida{border-left-color:#22c55e}
  .promesa.en_curso{border-left-color:#3b82f6}
  .promesa.parcial{border-left-color:#eab308}
  .promesa.rota,.promesa.incumplida{border-left-color:#ef4444}
  
  .promesa-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .promesa-actor{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);font-weight:600}
  .promesa-actor .avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
  .promesa-estado{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
  .promesa-estado.cumplida{background:rgba(34,197,94,0.15);color:#22c55e}
  .promesa-estado.en_curso{background:rgba(59,130,246,0.15);color:#3b82f6}
  .promesa-estado.parcial{background:rgba(234,179,8,0.15);color:#eab308}
  .promesa-estado.rota,.promesa-estado.incumplida{background:rgba(239,68,68,0.15);color:#ef4444}
  
  .promesa-texto{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:8px;font-weight:600}
  .promesa-resumen{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:8px}
  .promesa-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text3)}
  .promesa-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .promesa-actions a{font-size:11px;padding:6px 12px;border-radius:6px;text-decoration:none;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .promesa-actions a:hover{color:var(--accent2);border-color:var(--accent)}
  .promesa-destacada{background:rgba(251,191,36,0.10);color:#fbbf24;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
  
  .actions-bot{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
  .btn-prim{background:var(--gold);color:#0b0f1a}
  .btn-ia{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
  
  .footer{font-size:11px;color:var(--text3);margin-top:18px;padding-top:14px;border-top:1px solid var(--border);text-align:center}
  .loading{text-align:center;padding:30px;color:var(--text3)}
  
  @media (max-width:600px){
    .wrap{padding:12px}
    .hero{padding:20px}
    .hero h1{font-size:24px}
    .term-segment{font-size:10px}
  }
</style>
</head>
<body>
<script>if(new URLSearchParams(location.search).get('embedded')==='1')document.body.classList.add('embedded');</script>
<div class="wrap">
  <a href="/" target="_top" class="back" onclick="window.tequioPromBack(event);return false;">← Tequio</a>
  <div id="contenido" class="loading">Cargando promesas…</div>
</div>

<script>
window.tequioPromBack=function(e){
  if(e)e.preventDefault();
  try{if(window.parent&&window.parent!==window&&typeof window.parent.cargarPanel==='function'){window.parent.cargarPanel('dashboard');return;}}catch(err){}
  window.location.href='/';
};

var SB='https://mhsuihwjgtzxflesbnxv.supabase.co';
var ANON='sb_publishable_grJAWIMoSr5b8YfaB7HVlw_OesNipBz';
var state = {estado:null, actor:null, categoria:null, busqueda:null};
var lastData = null;

function rpc(name, body){
  return fetch(SB + '/rest/v1/rpc/' + name, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+ANON},
    body: JSON.stringify(body||{})
  }).then(function(r){return r.json();});
}

function fmtFecha(s){
  if(!s) return '—';
  return new Date(s).toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
}
function actorAvatar(slug){
  return (slug||'?').split('-').slice(0,2).map(function(s){return s[0]||'';}).join('').toUpperCase();
}
function actorNombre(slug){
  return (slug||'').split('-').map(function(s){return s.charAt(0).toUpperCase()+s.slice(1);}).join(' ');
}
function catIcon(cat){
  return ({economia:'💰',justicia:'⚖️',seguridad:'🛡️',educacion:'📚',salud:'🏥',
    energia:'⚡',vivienda:'🏠',infraestructura:'🏗️',derechos:'✊',ambiental:'🌿'})[cat] || '📌';
}
function estadoIcon(e){
  return ({cumplida:'✅',en_curso:'🔵',parcial:'🟡',rota:'❌',incumplida:'❌',pendiente:'⏳'})[e] || '⏳';
}
function esc(s){return String(s||'').replace(/[<>"']/g,function(c){return ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

async function cargar(){
  try {
    var stats = await rpc('promesas_stats_v2');
    if(stats && stats[0]) stats = stats[0];
    var statsObj = stats.promesas_stats_v2 || stats;
    
    var lista = await rpc('promesas_listar_v2', {
      p_estado: state.estado, p_actor: state.actor, p_categoria: state.categoria,
      p_busqueda: state.busqueda, p_limit: 50, p_offset: 0
    });
    
    render(statsObj, lista || []);
  } catch(e){
    document.getElementById('contenido').innerHTML = '<div style="background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.30);border-radius:10px;padding:16px;color:#fca5a5;text-align:center">Error: ' + e + '</div>';
  }
}

function render(stats, lista){
  lastData = stats;
  var total = Number(stats.total||0);
  var cumplidas = Number(stats.cumplidas||0);
  var en_curso = Number(stats.en_curso||0);
  var parcial = Number(stats.parcial||0);
  var rotas = Number(stats.incumplidas||0);
  var pend = Number(stats.pendientes||0);
  
  var pctCum = total ? (cumplidas/total*100).toFixed(1) : 0;
  var pctEnc = total ? (en_curso/total*100).toFixed(1) : 0;
  var pctPar = total ? (parcial/total*100).toFixed(1) : 0;
  var pctPend = total ? (pend/total*100).toFixed(1) : 0;
  var pctRot = total ? (rotas/total*100).toFixed(1) : 0;
  
  // Top categorías
  var cats = (stats.categorias||[]);
  var actores = (stats.top_actores||[]);
  
  var contenidoHtml = 
    '<div class="hero">' +
      '<div class="hero-header">' +
        '<div style="font-size:54px;line-height:1">🎯</div>' +
        '<div style="flex:1;min-width:240px">' +
          '<h1>Compromisos Públicos</h1>' +
          '<p>Seguimiento de promesas políticas · Presidencia, Gobernaturas, Alcaldías · Cero invención</p>' +
        '</div>' +
        '<a href="https://www.gob.mx/presidencia" target="_blank" rel="noopener" class="hero-link">Presidencia →</a>' +
      '</div>' +
      '<div class="hero-grid">' +
        '<div class="hero-stat"><div class="num">' + total + '</div><div class="lbl">Promesas</div></div>' +
        '<div class="hero-stat"><div class="num" style="color:#86efac">' + cumplidas + '</div><div class="lbl">Cumplidas</div></div>' +
        '<div class="hero-stat"><div class="num">' + (Number(stats.actores)||0) + '</div><div class="lbl">Actores</div></div>' +
        '<div class="hero-stat"><div class="num">' + cats.length + '</div><div class="lbl">Categorías</div></div>' +
      '</div>' +
    '</div>' +
    
    '<div class="sello">' +
      '<div style="font-size:28px">✅</div>' +
      '<div style="flex:1;min-width:220px">' +
        '<div class="lbl">FUENTE OFICIAL · 100 COMPROMISOS</div>' +
        '<div style="font-size:12px;color:var(--text2);margin-top:3px">Discursos, comunicados oficiales, gob.mx · Cada promesa con link a su fuente original</div>' +
      '</div>' +
    '</div>' +
    
    '<details class="educ"><summary><span>🤓 ¿Cómo funciona el seguimiento de Compromisos? · Educación cívica</span><span style="font-size:11px">▾</span></summary><div class="body">' +
      '<p style="margin-bottom:8px">Tequio rastrea las <strong>promesas públicas</strong> de funcionarios y compara con la evidencia oficial de avance.</p>' +
      '<ul>' +
        '<li><strong>Origen:</strong> Discursos de toma de protesta, conferencias mañaneras, 100 compromisos del Segundo Piso 4T, etc.</li>' +
        '<li><strong>Estados:</strong> Cumplida ✅ · En curso 🔵 · Parcial 🟡 · Rota ❌ · Pendiente ⏳</li>' +
        '<li><strong>Evidencia:</strong> Solo se marca cambio con fuente oficial verificable (gob.mx, decretos DOF, comunicados).</li>' +
        '<li><strong>Sin opinión:</strong> Tequio no juzga si la promesa es "buena" o "mala", solo si se cumple.</li>' +
      '</ul>' +
      '<p style="margin:8px 0 0;color:var(--text3);font-size:11px">📚 Inspirado en proyectos internacionales como PolitiFact (USA), Promesometro (Brasil) y The Promise Tracker (Reino Unido).</p>' +
    '</div></details>' +
    
    // Termómetro visual
    '<div class="termometro">' +
      '<div class="term-title">📊 Estado general · ' + total + ' promesas</div>' +
      '<div class="term-bar">' +
        (cumplidas>0?'<div class="term-segment cumplida" style="width:' + pctCum + '%">' + (pctCum>5?cumplidas+' · '+pctCum+'%':cumplidas) + '</div>':'') +
        (en_curso>0?'<div class="term-segment en-curso" style="width:' + pctEnc + '%">' + (pctEnc>5?en_curso+' · '+pctEnc+'%':en_curso) + '</div>':'') +
        (parcial>0?'<div class="term-segment parcial" style="width:' + pctPar + '%">' + (pctPar>5?parcial+' · '+pctPar+'%':parcial) + '</div>':'') +
        (pend>0?'<div class="term-segment pendiente" style="width:' + pctPend + '%">' + (pctPend>5?pend+' · '+pctPend+'%':pend) + '</div>':'') +
        (rotas>0?'<div class="term-segment rota" style="width:' + pctRot + '%">' + (pctRot>5?rotas+' · '+pctRot+'%':rotas) + '</div>':'') +
      '</div>' +
      '<div class="term-legend">' +
        '<div class="term-legend-item"><span class="dot" style="background:#22c55e"></span>✅ Cumplidas (' + cumplidas + ')</div>' +
        '<div class="term-legend-item"><span class="dot" style="background:#3b82f6"></span>🔵 En curso (' + en_curso + ')</div>' +
        '<div class="term-legend-item"><span class="dot" style="background:#eab308"></span>🟡 Parcial (' + parcial + ')</div>' +
        (pend>0?'<div class="term-legend-item"><span class="dot" style="background:#6b7280"></span>⏳ Pendiente (' + pend + ')</div>':'') +
        '<div class="term-legend-item"><span class="dot" style="background:#ef4444"></span>❌ Rotas (' + rotas + ')</div>' +
      '</div>' +
    '</div>' +
    
    // Tabs por estado
    '<div class="filters">' +
      '<button class="chip ' + (state.estado===null?'active':'') + '" onclick="promSetEstado(this,null)">🌐 Todas (' + total + ')</button>' +
      '<button class="chip ' + (state.estado==='cumplida'?'active':'') + '" onclick="promSetEstado(this,\'cumplida\')">✅ Cumplidas (' + cumplidas + ')</button>' +
      '<button class="chip ' + (state.estado==='en_curso'?'active':'') + '" onclick="promSetEstado(this,\'en_curso\')">🔵 En curso (' + en_curso + ')</button>' +
      '<button class="chip ' + (state.estado==='parcial'?'active':'') + '" onclick="promSetEstado(this,\'parcial\')">🟡 Parcial (' + parcial + ')</button>' +
    '</div>' +
    
    // Filtros colapsables
    '<details class="notf"><summary><span>🏷️ Filtrar por categoría</span>' + (state.categoria?'<span class="active-tag">' + state.categoria + '</span>':'') + '</summary>' +
      '<div class="filter-body">' +
        '<button class="chip ' + (!state.categoria?'active':'') + '" onclick="promSetCat(this,null)">Todas</button>' +
        cats.map(function(c){return '<button class="chip ' + (state.categoria===c.cat?'active':'') + '" onclick="promSetCat(this,\'' + c.cat + '\')">' + catIcon(c.cat) + ' ' + c.cat + ' (' + c.t + ')</button>';}).join('') +
      '</div>' +
    '</details>' +
    
    '<details class="notf"><summary><span>👤 Filtrar por actor</span>' + (state.actor?'<span class="active-tag">' + actorNombre(state.actor) + '</span>':'') + '</summary>' +
      '<div class="filter-body">' +
        '<button class="chip ' + (!state.actor?'active':'') + '" onclick="promSetActor(this,null)">Todos</button>' +
        actores.map(function(a){return '<button class="chip ' + (state.actor===a.actor?'active':'') + '" onclick="promSetActor(this,\'' + a.actor + '\')">' + actorNombre(a.actor) + ' (' + a.t + ')</button>';}).join('') +
      '</div>' +
    '</details>' +
    
    '<div id="prom-lista" style="margin-top:14px"></div>' +
    
    '<div class="actions-bot">' +
      '<a href="https://www.gob.mx/cms/uploads/attachment/file/964733/100_compromisos.pdf" target="_blank" rel="noopener" class="btn btn-prim">📋 100 Compromisos oficial</a>' +
      '<a href="javascript:void(0)" onclick="navegarConIA()" class="btn btn-ia">🤖 Preguntar IA</a>' +
    '</div>' +
    
    '<div class="footer">Fuente: Discursos oficiales · gob.mx · Decretos DOF · Revisión manual con evidencia documentada</div>';
  
  document.getElementById('contenido').innerHTML = contenidoHtml;
  document.getElementById('contenido').className = '';
  renderLista(lista);
}

function renderLista(lista){
  if(!lista || !lista.length){
    document.getElementById('prom-lista').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">📭 Sin promesas con los filtros actuales.</div>';
    return;
  }
  var html = lista.map(function(p){
    var ic = catIcon(p.categoria);
    var ei = estadoIcon(p.estado_actual);
    var estLabel = ({cumplida:'CUMPLIDA',en_curso:'EN CURSO',parcial:'PARCIAL',rota:'ROTA',incumplida:'ROTA',pendiente:'PENDIENTE'})[p.estado_actual] || (p.estado_actual||'pendiente').toUpperCase();
    return '<div class="promesa ' + (p.estado_actual||'pendiente') + '">' +
      '<div class="promesa-header">' +
        '<div class="promesa-actor">' +
          '<div class="avatar">' + actorAvatar(p.actor_slug) + '</div>' +
          '<div>' + actorNombre(p.actor_slug) + '</div>' +
          (p.destacada?'<span class="promesa-destacada">⭐ DESTACADA</span>':'') +
        '</div>' +
        '<div class="promesa-estado ' + (p.estado_actual||'pendiente') + '">' + ei + ' ' + estLabel + '</div>' +
      '</div>' +
      '<div class="promesa-texto">' + esc(p.texto_promesa) + '</div>' +
      (p.resumen?'<div class="promesa-resumen">' + esc(p.resumen) + '</div>':'') +
      '<div class="promesa-meta">' +
        (p.categoria?'<span>' + ic + ' ' + p.categoria + '</span>':'') +
        (p.fecha_promesa?'<span>📅 Prometida: ' + fmtFecha(p.fecha_promesa) + '</span>':'') +
        (p.fecha_limite?'<span>⏰ Límite: ' + fmtFecha(p.fecha_limite) + '</span>':'') +
        (p.entidad?'<span>📍 ' + p.entidad + '</span>':'') +
      '</div>' +
      '<div class="promesa-actions">' +
        (p.fuente_url?'<a href="' + p.fuente_url + '" target="_blank" rel="noopener">📄 Fuente oficial</a>':'') +
        (p.evidencia_actual_url?'<a href="' + p.evidencia_actual_url + '" target="_blank" rel="noopener">📊 Ver evidencia avance</a>':'') +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('prom-lista').innerHTML = html;
}

window.promSetEstado=function(el,e){state.estado=e;cargar();};
