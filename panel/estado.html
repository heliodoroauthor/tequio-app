<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0b0f1a">
<title>Panel estatal · Tequio</title>
<link rel="icon" href="/favicon.ico">
<style>
  :root {
    --bg:#0b0f1a; --card:#121826; --border:#1f2a3d;
    --text:#e8eef9; --muted:#8a98b3; --hint:#6b7a96;
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --info:#3b82f6;
    --accent:#a78bfa; --gold:#fbbf24;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .wrap{max-width:980px;margin:0 auto;padding:18px 16px 80px}
  a{color:var(--gold);text-decoration:none}
  a:hover{text-decoration:underline}
  .back{display:inline-block;margin:6px 0 18px;color:var(--muted);font-size:14px}
  .back:hover{color:var(--gold)}
  .hero{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border:1px solid var(--border);border-radius:18px;padding:28px 22px;margin-bottom:22px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(251,191,36,.08),transparent 60%);pointer-events:none}
  .hero h1{margin:0 0 6px;font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .hero .clave-badge{display:inline-block;background:var(--gold);color:#0b0f1a;font-weight:700;padding:3px 10px;border-radius:8px;font-size:12px;margin-right:8px;vertical-align:middle}
  .hero .total-historico{font-size:34px;font-weight:800;color:var(--gold);margin:14px 0 4px;letter-spacing:-.02em}
  .hero .sub{color:var(--muted);font-size:14px;margin-top:4px}
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .stat-card .value{font-size:24px;font-weight:800;margin-top:6px;color:var(--text);letter-spacing:-.01em}
  .stat-card .sub{font-size:12px;color:var(--hint);margin-top:4px}
  .section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
  .section h2{margin:0 0 14px;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
  .section h2 .icon{font-size:18px}
  .bar-chart{display:flex;align-items:flex-end;gap:4px;height:160px;padding:8px 0;border-bottom:1px solid var(--border)}
  .bar-chart .bar{flex:1;background:linear-gradient(180deg,var(--gold) 0%,#d97706 100%);border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer;transition:opacity .15s}
  .bar-chart .bar:hover{opacity:.8}
  .bar-chart .bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#0b0f1a;border:1px solid var(--border);padding:6px 8px;border-radius:6px;font-size:11px;white-space:nowrap;color:var(--text);margin-bottom:6px;z-index:10}
  .bar-chart .bar:hover .tip{display:block}
  .bar-labels{display:flex;gap:4px;margin-top:4px}
  .bar-labels span{flex:1;text-align:center;font-size:10px;color:var(--hint)}
  .row-list{display:flex;flex-direction:column;gap:8px}
  .row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0b0f1a;border-radius:8px;border:1px solid var(--border)}
  .row-item .name{font-size:13px;color:var(--text);font-weight:500}
  .row-item .val{font-size:13px;font-weight:700;color:var(--gold)}
  .partido-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .partido-chip{background:#0b0f1a;border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
  .partido-chip .p-name{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
  .partido-chip .p-count{font-size:22px;font-weight:800;color:var(--gold);margin-top:2px}
  .muni-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
  .muni-card{background:#0b0f1a;border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s,transform .1s}
  .muni-card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .muni-card .m-name{font-size:14px;font-weight:600;color:var(--text)}
  .muni-card .m-pob{font-size:12px;color:var(--muted);margin-top:3px}
  .rep-list{display:flex;flex-direction:column;gap:6px}
  .rep-card{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0b0f1a;border-radius:8px;border:1px solid var(--border);font-size:13px}
  .rep-card .r-name{color:var(--text);font-weight:500}
  .rep-card .r-meta{color:var(--muted);font-size:11px}
  .partido-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--border);color:var(--text);margin-left:6px}
  .estado-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .estado-tile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;transition:border-color .15s,transform .1s;text-align:center}
  .estado-tile:hover{border-color:var(--gold);transform:translateY(-1px)}
  .estado-tile .t-clave{font-size:11px;color:var(--gold);font-weight:700}
  .estado-tile .t-name{font-size:13px;color:var(--text);font-weight:600;margin-top:4px}
  .disclaimer{font-size:12px;color:var(--hint);margin-top:24px;padding:14px;background:#0b0f1a;border-radius:10px;border:1px solid var(--border);line-height:1.5}
  .loading{text-align:center;padding:60px 20px;color:var(--muted)}
  .loading .spin{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
  @media(max-width:560px){
    .hero h1{font-size:24px}
    .hero .total-historico{font-size:26px}
    .stat-card .value{font-size:18px}
  }
</style>
</head>
<body>
<script>
(function(){
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    document.documentElement.classList.add('embedded');
    var style = document.createElement('style');
    style.textContent = '.embedded a[href="/"], .embedded a[href="../"], .embedded .back-link, .embedded header > a:first-child { display:none !important; } .embedded body { padding-top: 0 !important; }';
    document.head.appendChild(style);
  }
})();
</script>
<div class="wrap">
  <div id="estado-nav" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:6px 0 18px">
  <a href="/panel/estado.html" id="tequio-back" class="back" style="margin:0;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--card,#1a1f2e);border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--muted)" onclick="window.tequioEstadoBack(event);return false;">← Otro estado</a>
  <select id="estado-switcher" onchange="window.tequioCambiarEstado(this.value)" style="background:var(--card,#1a1f2e);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;flex:1;max-width:280px;min-width:160px">
    <option value="">— Cambiar de estado —</option>
  </select>
  <a href="/" target="_top" style="margin-left:auto;font-size:12px;color:var(--muted);text-decoration:none;padding:6px 10px">🏠 Inicio</a>
</div>
  <div id="content">
    <div class="loading"><div class="spin"></div><div style="margin-top:14px">Cargando panel estatal…</div></div>
  </div>
</div>
<script>
/* === NAV HELPER — preserva ?embedded=1 en navegación interna === */
function navTo(url) {
  if (new URLSearchParams(location.search).get('embedded') === '1') {
    const sep = url.includes('?') ? '&' : '?';
    url += sep + 'embedded=1';
  }
  location.href = url;
}

/* === BACK LINK INTELIGENTE — cuando está embebido, avisa al parent === */

// 🦎 Navegación inteligente del Panel Estatal
window.tequioEstadoBack = function(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  try {
    // SPA: recargar el iframe estado con la landing (sin ?clave=)
    if (window.parent && window.parent !== window && typeof window.parent.cargarPanel === 'function') {
      try {
        var existing = window.parent.document.getElementById('page-iframe-estado');
        if (existing) {
          var ifr = existing.querySelector('iframe');
          if (ifr) ifr.src = '/panel/estado.html?embedded=1&t=' + Date.now();
        }
      } catch(err) {}
      window.parent.cargarPanel('estado');
      return false;
    }
  } catch(err) {}
  // Fallback: navegar directo
  try { window.location.href = '/panel/estado.html'; }
  catch(err) { location.assign('/panel/estado.html'); }
  return false;
};

window.tequioCambiarEstado = function(clave) {
  if (!clave) return;
  // Conservar embedded=1 si aplica
  var embedded = new URLSearchParams(location.search).get('embedded') === '1';
  var newUrl = '/panel/estado.html?clave=' + encodeURIComponent(clave) + (embedded ? '&embedded=1' : '');
  window.location.href = newUrl;
};

// Llenar dropdown de estados (siempre, no solo cuando hay state cargado)
(function llenarSwitcher(){
  function fill() {
    var sel = document.getElementById('estado-switcher');
    if (!sel) return setTimeout(fill, 100);
    var ESTADOS_NAV = {
      "01":"Aguascalientes","02":"Baja California","03":"Baja California Sur","04":"Campeche",
      "05":"Coahuila","06":"Colima","07":"Chiapas","08":"Chihuahua","09":"Ciudad de México",
      "10":"Durango","11":"Guanajuato","12":"Guerrero","13":"Hidalgo","14":"Jalisco",
      "15":"Estado de México","16":"Michoacán","17":"Morelos","18":"Nayarit","19":"Nuevo León",
      "20":"Oaxaca","21":"Puebla","22":"Querétaro","23":"Quintana Roo","24":"San Luis Potosí",
      "25":"Sinaloa","26":"Sonora","27":"Tabasco","28":"Tamaulipas","29":"Tlaxcala",
      "30":"Veracruz","31":"Yucatán","32":"Zacatecas"
    };
    // Mantener primera opción
    var current = (new URLSearchParams(location.search).get('clave') || '').padStart(2,'0');
    sel.innerHTML = '<option value="">— Cambiar de estado —</option>' +
      Object.keys(ESTADOS_NAV).map(function(k){
        var sel_attr = k === current ? ' selected' : '';
        return '<option value="' + k + '"' + sel_attr + '>' + k + ' · ' + ESTADOS_NAV[k] + '</option>';
      }).join('');
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fill);
  } else {
    fill();
  }
})();


const ESTADOS = {
  "01":"Aguascalientes","02":"Baja California","03":"Baja California Sur","04":"Campeche",
  "05":"Coahuila","06":"Colima","07":"Chiapas","08":"Chihuahua","09":"Ciudad de México",
  "10":"Durango","11":"Guanajuato","12":"Guerrero","13":"Hidalgo","14":"Jalisco",
  "15":"Estado de México","16":"Michoacán","17":"Morelos","18":"Nayarit","19":"Nuevo León",
  "20":"Oaxaca","21":"Puebla","22":"Querétaro","23":"Quintana Roo","24":"San Luis Potosí",
  "25":"Sinaloa","26":"Sonora","27":"Tabasco","28":"Tamaulipas","29":"Tlaxcala",
  "30":"Veracruz","31":"Yucatán","32":"Zacatecas"
};
function fmt(n) {
  n = Number(n || 0);
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + ' bn';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + ' mmdp';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + ' mdp';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + ' mil';
  return new Intl.NumberFormat('es-MX', {style: 'currency', currency: 'MXN', maximumFractionDigits: 0}).format(n);
}
function fmtNum(n) {
  return new Intl.NumberFormat('es-MX').format(Number(n || 0));
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderLanding() {
  const tiles = Object.entries(ESTADOS).map(([clave, nombre]) =>
    `<div class="estado-tile" onclick="navTo('?clave=${clave}')">
      <div class="t-clave">${clave}</div>
      <div class="t-name">${esc(nombre)}</div>
    </div>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div style="background:linear-gradient(135deg,#1e3a8a 0%,#0e7490 50%,#06b6d4 100%);border-radius:20px;padding:28px;margin:0 0 18px;color:#fff;box-shadow:0 8px 24px rgba(14,116,144,0.30)">
      <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:14px">
        <div style="font-size:60px;line-height:1">🗺️</div>
        <div style="flex:1;min-width:240px">
          <h1 style="font-size:30px;font-weight:900;margin:0;color:#fff;letter-spacing:-0.02em">Panel Estatal</h1>
          <p style="margin:8px 0 0;opacity:0.94;font-size:15px;line-height:1.4">Las <strong>32 entidades federativas</strong> de México · transferencias 2011-2026, representantes y municipios.</p>
        </div>
        <div style="background:rgba(255,255,255,0.18);padding:10px 14px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.5px">🇲🇽 ESTADO</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:14px;background:rgba(255,255,255,0.10);border-radius:12px;backdrop-filter:blur(10px)">
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">32</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Entidades</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#fde68a">15</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Años de data</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#86efac">126M</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Habitantes</div></div>
        <div style="text-align:center"><div style="font-size:14px;font-weight:700;line-height:1.3">SHCP · INEGI</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Fuentes</div></div>
      </div>
    </div>
    <details style="background:linear-gradient(135deg,rgba(14,116,144,0.08),rgba(14,116,144,0.02));border:1px solid rgba(14,116,144,0.35);border-radius:12px;margin-bottom:14px">
      <summary style="cursor:pointer;padding:12px 16px;font-size:13px;font-weight:700;color:#67e8f9;list-style:none;display:flex;align-items:center;justify-content:space-between"><span>🤓 ¿Qué encuentras en cada estado? · 4 dimensiones</span><span style="font-size:11px">▾</span></summary>
      <div style="padding:0 16px 14px;font-size:12px;color:var(--muted);line-height:1.6">Click en cualquier entidad y verás:
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:10px">
          <div style="background:rgba(34,197,94,0.10);border-left:3px solid #22c55e;padding:8px 10px;border-radius:6px"><strong style="color:#86efac">💰 Transferencias</strong><br><span style="font-size:11px">Ramos 28 y 33 anuales · 2011-2026 · SHCP.</span></div>
          <div style="background:rgba(245,158,11,0.10);border-left:3px solid #f59e0b;padding:8px 10px;border-radius:6px"><strong style="color:#fde68a">🏙️ Municipios</strong><br><span style="font-size:11px">Los principales del estado por población.</span></div>
          <div style="background:rgba(168,85,247,0.10);border-left:3px solid #a855f7;padding:8px 10px;border-radius:6px"><strong style="color:#d8b4fe">👥 Representantes</strong><br><span style="font-size:11px">Gobernador, diputados federales, senadores.</span></div>
          <div style="background:rgba(220,38,38,0.10);border-left:3px solid #dc2626;padding:8px 10px;border-radius:6px"><strong style="color:#fca5a5">📊 Indicadores</strong><br><span style="font-size:11px">Población, marginación, ingresos estatales.</span></div>
        </div>
        <p style="margin-top:10px;font-size:11px;color:var(--hint)">⚖️ Art. 40 CPEUM: las entidades son soberanas en su régimen interior, pero la Federación coordina políticas vía Ramos 28/33 y leyes generales.</p>
      </div>
    </details>
    <div class="section">
      <h2><span class="icon">🗺️</span> Entidades federativas</h2>
      <div class="estado-grid">${tiles}</div>
    </div>
    <div class="disclaimer">
      Datos de Transferencias Federales a Entidades Federativas (SHCP) y Censo de Población y Vivienda (INEGI). Selecciona una entidad para ver el detalle de transferencias, municipios principales, presidentes municipales y representantes federales.
    </div>
  `;
}
function renderPanel(data) {
  const c = document.getElementById('content');
  const nombre = data.nombre_estado || ESTADOS[data.clave] || '';
  const total = data.total_transferencias_historicas || 0;
  const porAnio = data.transferencias_por_anio || [];
  const ultimoAnio = data.ultimo_anio_con_datos;
  const totalUltimo = porAnio.length ? porAnio[porAnio.length - 1].total : 0;
  const maxVal = Math.max(...porAnio.map(r => r.total), 1);
  const topFondos = data.top_fondos || [];
  const topRamos = data.top_ramos || [];
  const munis = data.municipios_top || [];
  const partidos = data.presidentes_partido || [];
  const dips = data.diputados_federales || [];
  const sens = data.senadores || [];
  const bars = porAnio.map(r => {
    const h = Math.max(2, (r.total / maxVal) * 100);
    return `<div class="bar" style="height:${h}%"><span class="tip">${r.anio}: ${fmt(r.total)}</span></div>`;
  }).join('');
  const barLabels = porAnio.map(r => `<span>${String(r.anio).slice(2)}</span>`).join('');
  const fondosHtml = topFondos.length
    ? topFondos.slice(0, 8).map(f => `<div class="row-item"><span class="name">${esc(f.fondo)}</span><span class="val">${fmt(f.total)}</span></div>`).join('')
    : '<div class="empty">Sin datos de fondos.</div>';
  const ramosHtml = topRamos.length
    ? topRamos.map(r => `<div class="row-item"><span class="name">${esc(r.ramo)}</span><span class="val">${fmt(r.total)}</span></div>`).join('')
    : '<div class="empty">Sin datos de ramos.</div>';
  const partidosHtml = partidos.length
    ? `<div class="partido-grid">${partidos.slice(0, 8).map(p => `<div class="partido-chip"><div class="p-name">${esc(p.partido)}</div><div class="p-count">${p.num}</div></div>`).join('')}</div>`
    : '<div class="empty">Sin datos de presidentes municipales.</div>';
  const munisHtml = munis.length
    ? `<div class="muni-grid">${munis.map(m => `<div class="muni-card" onclick="navTo('/panel/municipio.html?clave_inegi=${esc(m.clave_inegi)}')"><div class="m-name">${esc(m.nombre)}</div><div class="m-pob">${m.poblacion_total ? fmtNum(m.poblacion_total) + ' habs.' : 'Sin datos de población'}</div></div>`).join('')}</div>`
    : '<div class="empty">Sin municipios disponibles.</div>';
  const dipsHtml = dips.length
    ? `<div class="rep-list">${dips.slice(0, 15).map(d => `<div class="rep-card"><span class="r-name">${esc(d.nombre)}<span class="partido-tag">${esc(d.partido_codigo || d.partido || '')}</span></span><span class="r-meta">${esc(d.distrito || '')}</span></div>`).join('')}</div>${dips.length > 15 ? `<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted)">+${dips.length - 15} más</div>` : ''}`
    : '<div class="empty">Sin diputados federales asociados.</div>';
  const sensHtml = sens.length
    ? `<div class="rep-list">${sens.map(s => `<div class="rep-card"><span class="r-name">${esc(s.nombre_completo || s.nombre || '')}<span class="partido-tag">${esc(s.partido || '')}</span></span><span class="r-meta">${esc(s.tipo_eleccion || s.principio || '')}</span></div>`).join('')}</div>`
    : '<div class="empty">Sin senadores asociados directamente en datos.</div>';
  c.innerHTML = `
    <div style="background:linear-gradient(135deg,#3730a3 0%,#7c3aed 50%,#c026d3 100%);border-radius:20px;padding:28px;margin:0 0 18px;color:#fff;box-shadow:0 8px 24px rgba(124,58,237,0.35)">
      <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:14px">
        <div style="font-size:60px;line-height:1">🗺️</div>
        <div style="flex:1;min-width:240px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span style="background:rgba(255,255,255,0.20);padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:1px">${data.clave}</span>
            <span style="font-size:10px;font-weight:700;letter-spacing:2px;opacity:0.85;text-transform:uppercase">ESTADO</span>
          </div>
          <h1 style="font-size:34px;font-weight:900;margin:0;color:#fff;letter-spacing:-0.02em;line-height:1">${esc(nombre || 'Estado ' + data.clave)}</h1>
          <div style="font-size:28px;font-weight:900;color:#fde68a;margin-top:8px;font-family:var(--font-display,inherit);letter-spacing:-0.01em">${fmt(total)}</div>
          <div style="margin:4px 0 0;opacity:0.92;font-size:13px">Transferencias acumuladas <strong>2011-${ultimoAnio || '2026'}</strong> · ${porAnio.length} años con data</div>
        </div>
        <div style="background:rgba(255,255,255,0.18);padding:10px 14px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:0.5px">🇲🇽 SHCP</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:14px;background:rgba(255,255,255,0.10);border-radius:12px;backdrop-filter:blur(10px)">
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">${fmt(totalUltimo)}</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Total ${ultimoAnio || ''}</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#fde68a">${data.num_municipios || 0}</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Municipios</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#86efac">${data.num_diputados || dips.length || 0}</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Diputados fed.</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:#67e8f9">${data.num_senadores || sens.length || 0}</div><div style="font-size:10px;opacity:0.8;text-transform:uppercase">Senadores</div></div>
      </div>
    </div>
    <details style="background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(124,58,237,0.02));border:1px solid rgba(124,58,237,0.35);border-radius:12px;margin-bottom:14px">
      <summary style="cursor:pointer;padding:12px 16px;font-size:13px;font-weight:700;color:#c4b5fd;list-style:none;display:flex;align-items:center;justify-content:space-between"><span>🤓 ¿Qué son los Ramos 28 y 33? · Transferencias federales</span><span style="font-size:11px">▾</span></summary>
      <div style="padding:0 16px 14px;font-size:12px;color:var(--muted);line-height:1.6">El dinero federal que llega a tu estado viene de <strong>2 grandes flujos</strong>:
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:10px">
          <div style="background:rgba(34,197,94,0.10);border-left:3px solid #22c55e;padding:8px 10px;border-radius:6px"><strong style="color:#86efac">Ramo 28 · Participaciones</strong><br><span style="font-size:11px">NO condicionadas. El estado decide en qué gastar.</span></div>
          <div style="background:rgba(168,85,247,0.10);border-left:3px solid #a855f7;padding:8px 10px;border-radius:6px"><strong style="color:#d8b4fe">Ramo 33 · Aportaciones</strong><br><span style="font-size:11px">CONDICIONADAS: educación, salud, infraestructura, seguridad.</span></div>

          <div style="background:rgba(245,158,11,0.10);border-left:3px solid #f59e0b;padding:8px 10px;border-radius:6px"><strong style="color:#fde68a">ASF audita</strong><br><span style="font-size:11px">Cuenta Pública anual · 2-3 años de retraso típico.</span></div>
        </div>
        <p style="margin-top:10px;font-size:11px;color:var(--hint)">⚠️ Cifras son lo que la Federación TRANSFIRIÓ. El gasto real puede diferir si se subejerce o reasigna.</p>
      </div>
    </details>
    <div class="section">
      <h2><span class="icon">📊</span> Transferencias federales por año</h2>
      <div class="bar-chart">${bars}</div>
      <div class="bar-labels">${barLabels}</div>
    </div>
    <div class="section">
      <h2><span class="icon">💰</span> Top fondos / programas</h2>
      <div class="row-list">${fondosHtml}</div>
    </div>

      <h2><span class="icon">🏛️</span> Top ramos (origen)</h2>
      <div class="row-list">${ramosHtml}</div>
    </div>
    <div class="section">
      <h2><span class="icon">🎨</span> Distribución partidista de alcaldías</h2>
      ${partidosHtml}
    </div>
    <div class="section">
      <h2><span class="icon">🏙️</span> Municipios principales</h2>
      ${munisHtml}
    </div>
    <div class="section">
      <h2><span class="icon">👥</span> Diputados federales del estado</h2>
      ${dipsHtml}
    </div>
    <div class="section">
      <h2><span class="icon">🎖️</span> Senadores</h2>
      ${sensHtml}
    </div>
    <div class="disclaimer">
      Fuentes: <strong>SHCP</strong> (Transferencias Federales a Entidades Federativas, ramos 23/28/33). <strong>INAFED</strong> (presidentes municipales). <strong>Cámara de Diputados / Senado de la República</strong> (representantes). <strong>INEGI</strong> (datos de población). Datos del periodo 2011-2026.
    </div>
  `;
}
async function loadPanel(clave) {
  try {
    const r = await fetch('/api/data?vista=estado_panel&clave=' + encodeURIComponent(clave));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderPanel(data);
    document.title = (data.nombre_estado || ESTADOS[clave] || 'Estado') + ' · Panel · Tequio';
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="hero">
        <h1>Error al cargar</h1>
        <div class="sub" style="color:var(--bad)">${esc(e.message)}</div>
        <div style="margin-top:14px"><a href="#" onclick="navTo('/panel/estado.html');return false;">← Ver todos los estados</a></div>
      </div>
    `;
  }
}
(function init() {
  const params = new URLSearchParams(location.search);
  const clave = (params.get('clave') || '').padStart(2, '0');
  if (clave && clave !== '00' && ESTADOS[clave]) {
    loadPanel(clave);
  } else {
    renderLanding();
  }
})();
</script>
<script>
/* P0.3 — Sort estados 01 → 32 numéricamente */
(function() {
  function sortEstadosOnce() {
    const selectors = ['.estado-item', '.estado-card', '[data-cve-ent]', '[data-estado]'];
    for (const sel of selectors) {
      const container = document.querySelector('.estados-grid, .estados-list, #estados');
      if (!container) continue;
      const items = Array.from(container.querySelectorAll(sel));
      if (items.length < 2) continue;
      items.sort(function(a, b) {
        const ca = (a.dataset.cveEnt || a.dataset.estado || a.textContent.match(/\d+/) || [''])[0];
        const cb = (b.dataset.cveEnt || b.dataset.estado || b.textContent.match(/\d+/) || [''])[0];
        return parseInt(ca) - parseInt(cb);
      });
      items.forEach(function(it) { container.appendChild(it); });
      break;
    }
  }
  let timer = null;
  const obs = new MutationObserver(function() {
    clearTimeout(timer);
    timer = setTimeout(sortEstadosOnce, 200);
  });
  if (document.body) obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(sortEstadosOnce, 1000);
  setTimeout(sortEstadosOnce, 3000);
})();
</script>
