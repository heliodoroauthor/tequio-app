name: Votos Individuales Diarios

# Corre todos los dias a las 21:00 UTC (15:00 CDMX)
# Despues de sesiones del Pleno: martes, miercoles, jueves
on:
  schedule:
    - cron: '0 21 * * 2,3,4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      - name: Run Votos scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_votos_individuales.py
