name: Votos Individuales Diarios

# Corre martes, miercoles, jueves a las 21:00 UTC (15:00 CDMX)
# FIX-24 2026-05-21: captura rows_inserted del stdout (FIX-22)
on:
  schedule:
    - cron: '0 21 * * 2,3,4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      - name: Run Votos scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_VOTACIONES: '300'
        run: |
          set -o pipefail
          python scripts/scrape_votos_individuales.py 2>&1 | tee /tmp/scraper.log
      - name: Extract rows
        id: rows
        if: always()
        run: |
          python3 -c "import re,os; t=open('/tmp/scraper.log').read() if os.path.exists('/tmp/scraper.log') else ''; m=re.search(r'rows_inserted=(\d+)', t) or re.search(r'Votos individuales insertados:\s+(\d+)', t) or re.search(r'insertados=(\d+)', t); n = m.group(1) if m else '0'; open(os.environ['GITHUB_OUTPUT'],'a').write(f'rows={n}\n')"
      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: votos
          status: ${{ job.status }}
          rows_inserted: ${{ steps.rows.outputs.rows }}
          fuente_url: 'https://sitl.diputados.gob.mx/LXVI_leg/listados_votacionesnplxvi.php'
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
