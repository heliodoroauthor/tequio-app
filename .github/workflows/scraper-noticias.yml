name: Noticias Oficiales RSS Daily

# Corre todos los dias a las 13:00 UTC (07:00 CDMX)
# Lee RSS de DOF, SEGOB, Presidencia y SCJN
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run noticias scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_PER_FUENTE: '40'
        run: python scripts/scrape_noticias.py
