name: Noticias Oficiales RSS Daily

# Corre todos los dias a las 13:00 UTC (07:00 CDMX)
# Lee RSS de DOF, SEGOB, Presidencia y SCJN
# H2.6-01b 2026-05-21: agregado cloudscraper para bypass de anti-bot en gob.mx
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml cloudscraper

      - name: Run noticias scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_PER_FUENTE: '40'
        run: python scripts/scrape_noticias.py

      - name: Start time
        id: t
        if: always()
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log to scraper_logs
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS=$([ "${{ job.status }}" = "success" ] && echo "ok" || echo "fail")
          curl -sS -X POST "$SUPABASE_URL/rest/v1/scraper_logs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "[{\"scraper_slug\":\"noticias\",\"status\":\"$STATUS\",\"workflow_run_id\":\"${{ github.run_id }}\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"http_status\":200}]"
