name: 🔍 Verify no-stale (tequio.app live)

# 🦎 Cero Invención · Si tequio.app vuelve a servir HTML con cifras viejas
# (por cache CF, Vercel edge, SW, lo que sea), este workflow falla en rojo
# y abre un issue automático vía health-check pipeline.

on:
  workflow_run:
    workflows: ["🔄 Sync KPIs Fallback (SEO + crawlers)"]
    types: [completed]
  schedule:
    - cron: '15 * * * *'  # cada hora al minuto 15
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 3

    steps:
      - name: Fetch live HTML
        id: fetch
        run: |
          set -euo pipefail
          curl -sSL --max-time 15 \
            -A "tequio-verify-no-stale/1.0 (+https://tequio.app)" \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            https://tequio.app/ > /tmp/live.html
          BYTES=$(wc -c </tmp/live.html)
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "fetched $BYTES bytes"
          if [ "$BYTES" -lt 1000 ]; then
            echo "::error::Live HTML demasiado pequeño ($BYTES bytes)"
            exit 1
          fi

      - name: Assert no stale strings
        run: |
          set -e
          FAIL=0
          for STR in "8,973" "8,518" "TEQUIO.MX"; do
            if grep -Fq "$STR" /tmp/live.html; then
              echo "::error::Cadena obsoleta encontrada en live HTML: '$STR'"
              echo "  Sample matches:"
              grep -Fn "$STR" /tmp/live.html | head -3
              FAIL=1
            else
              echo "✓ '$STR' ausente"
            fi
          done
          if [ "$FAIL" = "1" ]; then exit 1; fi

      - name: Assert meta == data-kpi=leyes
        run: |
          set -e
          # Meta description ("...con N,NNN leyes...")
          META_LEYES=$(grep -oP '(?<=Plataforma cívica de México con )[\d,]+ leyes' /tmp/live.html | head -1 | grep -oP '[\d,]+')
          # data-kpi="leyes">N,NNN</…
          KPI_LEYES=$(grep -oP 'data-kpi="leyes">\K[\d,]+' /tmp/live.html | sort -u)
          echo "meta description leyes = '$META_LEYES'"
          echo "data-kpi leyes (únicos) = '$KPI_LEYES'"

          if [ -z "$META_LEYES" ]; then
            echo "::error::No se encontró cifra de leyes en meta description"
            exit 1
          fi
          if [ -z "$KPI_LEYES" ]; then
            echo "::error::No se encontraron data-kpi=leyes en HTML"
            exit 1
          fi
          # KPI_LEYES puede tener múltiples valores únicos → cada uno debe = META_LEYES
          MISMATCH=0
          while IFS= read -r v; do
            if [ "$v" != "$META_LEYES" ]; then
              echo "::error::Drift: data-kpi=leyes ('$v') != meta description ('$META_LEYES')"
              MISMATCH=1
            fi
          done <<< "$KPI_LEYES"
          if [ "$MISMATCH" = "1" ]; then exit 1; fi
          echo "✓ meta description leyes == data-kpi=leyes ($META_LEYES)"

      - name: Assert Aviso de Privacidad publicado
        run: |
          set -e
          STATUS=$(curl -sS -o /tmp/priv.html -w "%{http_code}" --max-time 10 https://tequio.app/panel/privacidad.html)
          if [ "$STATUS" != "200" ]; then
            echo "::error::panel/privacidad.html no devuelve 200 (got $STATUS)"
            exit 1
          fi
          # Nota: 'privacidad@tequio.app' está protegido por Cloudflare Email Obfuscation
          # en producción (reescrito como /cdn-cgi/l/email-protection). El archivo origen
          # sí lo contiene literal — verificamos la presencia del marker de CF como prueba
          # indirecta de que un email fue obfuscado en la página.
          for STR in "LFPDPPP" "ARCO" "responsable" "Supabase" "Vercel" "cdn-cgi/l/email-protection"; do
            if ! grep -Fq "$STR" /tmp/priv.html; then
              echo "::error::aviso de privacidad sin cadena requerida: '$STR'"
              exit 1
            fi
          done
          echo "✓ Aviso de privacidad publicado con LFPDPPP, ARCO, responsable, contacto, transferencias"

      - name: Assert claims falsos eliminados
        run: |
          set -e
          for STR in "compañías del Oeste" "no en Discord, Telegram ni" "Cumplimos con la LFPDPPP" "Cada cifra enlaza al PDF oficial"; do
            if grep -Fq "$STR" /tmp/live.html; then
              echo "::error::Claim falso encontrado en live HTML: '$STR'"
              exit 1
            fi
          done
          echo "✓ 4 claims falsos ausentes"

      - name: Assert footer link a aviso
        run: |
          set -e
          if ! grep -Fq "/panel/privacidad.html" /tmp/live.html; then
            echo "::error::Footer no linkea aviso de privacidad"
            exit 1
          fi
          echo "✓ Footer linkea /panel/privacidad.html"

      - name: Assert ARCO endpoint válido
        run: |
          set -e
          # POST inválido (sin email) debe devolver 400 con error específico
          RESP=$(curl -sS -X POST "https://tequio.app/api/data?vista=arco_request" \
            -H "Content-Type: application/json" \
            -d '{"tipo_derecho":"acceso"}')
          if ! echo "$RESP" | grep -q "email"; then
            echo "::error::Endpoint /api/data?vista=arco_request no valida email correctamente"
            echo "  Respuesta: $RESP"
            exit 1
          fi
          echo "✓ Endpoint arco_request responde con validación de email"

      - name: Assert Red de Poder · Cero Invención filter
        run: |
          set -e
          # Verifica que el JS del monolito incluye el filtro Cero Invención
          # que evita pintar vínculos sin fuente_url por default
          if ! grep -Fq "if (!e.verificado && !redesShowSinFuente)" /tmp/live.html; then
            echo "::error::Filtro Cero Invención de Red de Poder ausente en HTML live"
            echo "  → vínculos sin fuente_url podrían pintarse por default"
            exit 1
          fi
          echo "✓ Filtro Cero Invención presente"
          if ! grep -Fq "let redesShowSinFuente = false" /tmp/live.html; then
            echo "::error::Default redesShowSinFuente no es false"
            exit 1
          fi
          echo "✓ Default toggle off (solo verificados visibles)"
          # Sanity al RPC
          RPC=$(curl -sS --max-time 10 -X POST \
            "https://mhsuihwjgtzxflesbnxv.supabase.co/rest/v1/rpc/dashboard_red_poder" \
            -H "Content-Type: application/json" \
            -H "apikey: sb_publishable_grJAWIMoSr5b8YfaB7HVlw_OesNipBz" \
            -H "Authorization: Bearer sb_publishable_grJAWIMoSr5b8YfaB7HVlw_OesNipBz" \
            -d '{"p_limit":50}')
          TOTAL=$(echo "$RPC" | python3 -c "import json,sys; print(json.load(sys.stdin).get('total_vinculos',0))")
          VERIF=$(echo "$RPC" | python3 -c "import json,sys; print(json.load(sys.stdin).get('vinculos_verificados',0))")
          echo "  RPC total_vinculos=$TOTAL  vinculos_verificados=$VERIF"
          if [ "$VERIF" -le 0 ]; then
            echo "::error::vinculos_verificados=$VERIF (esperado >0). Red de Poder no muestra nada."
            exit 1
          fi
          if [ "$VERIF" -gt "$TOTAL" ]; then
            echo "::error::Imposible: vinculos_verificados ($VERIF) > total ($TOTAL)"
            exit 1
          fi
          echo "::notice::✓ Red de Poder Cero Invención · default pinta $VERIF/$TOTAL"

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✅ tequio.app sirve HTML coherente y sin cadenas obsoletas"
          else
            echo "::error::🚨 STALE detectado en tequio.app — revisa CF / Vercel / SW / sync_kpis_fallback"
          fi
