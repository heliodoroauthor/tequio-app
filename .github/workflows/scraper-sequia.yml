name: CONAGUA Sequia Quincenal

# Corre los jueves a las 15:00 UTC
# FIX-27 2026-05-21: cloudscraper para SMN + urllib3<2 (cert chain SSL fix) + FIX-22
on:
  schedule:
    - cron: '0 15 * * 4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'urllib3<2' requests beautifulsoup4 lxml pdfplumber openpyxl cloudscraper
      - name: Run CONAGUA Sequia scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python scripts/scrape_conagua_v4.py 2>&1 | tee /tmp/scraper.log
      - name: Extract rows
        id: rows
        if: always()
        run: |
          python3 -c "import re,os; t=open('/tmp/scraper.log').read() if os.path.exists('/tmp/scraper.log') else ''; m=re.search(r'rows_inserted=(\d+)', t) or re.search(r'sequia.*?(\d+)\s+estados', t, re.I|re.S) or re.search(r'(\d+)\s+filas?\s+insertad', t); n = m.group(1) if m else '0'; open(os.environ['GITHUB_OUTPUT'],'a').write(f'rows={n}\n')"
      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: conagua_sequia
          status: ${{ job.status }}
          rows_inserted: ${{ steps.rows.outputs.rows }}
          fuente_url: 'https://smn.conagua.gob.mx/tools/RESOURCES/Monitor%20de%20Sequia%20en%20Mexico/'
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
