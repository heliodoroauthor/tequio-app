name: Camara Diputados Weekly

# Corre los lunes a las 11:00 UTC (05:00 CDMX)
# SITL actualiza datos de diputados con baja frecuencia (titulares, suplentes, comisiones)
on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      - name: Run Diputados scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_diputados.py
      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: diputados
          status: ${{ job.status }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
