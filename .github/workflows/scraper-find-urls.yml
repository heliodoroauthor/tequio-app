name: Find URLs Leyes Estatales (compendios)

# v2 (15-jun): scrape compendios oficiales por estado en lugar de DDG search.
# v1 fallo porque DDG bot-blocks GH Actions. Compendios son sitios publicos
# que entregan PDFs reales por nombre.

on:
  # Cron desactivado temporalmente hasta agregar mas estados. NL solo es
  # 198 leyes que se resuelven en una corrida (~30s).
  # schedule:
  #   - cron: '0 3 * * *'  # diario 03:00 UTC
  workflow_dispatch:
    inputs:
      state:
        description: 'Estado a procesar (vacio = todos)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Solo mostrar sin escribir DB'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  find_urls:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests beautifulsoup4
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATE_FILTER: ${{ inputs.state }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -o pipefail
          # Quoting array para soportar nombres con espacios (Nuevo Leon, etc)
          ARGS=()
          if [ -n "$STATE_FILTER" ]; then ARGS+=("--state=$STATE_FILTER"); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=("--dry-run"); fi
          python3 scripts/find_urls_compendios.py "${ARGS[@]}" 2>&1 | tee /tmp/scraper.log

      - name: Assert SUMMARY exists
        if: always()
        run: |
          if ! grep -q "SUMMARY " /tmp/scraper.log 2>/dev/null; then
            echo "::error::Scraper no imprimio SUMMARY"
            exit 1
          fi
          grep "SUMMARY " /tmp/scraper.log | tail -1
