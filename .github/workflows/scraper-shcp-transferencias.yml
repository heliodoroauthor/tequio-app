name: SHCP Transferencias Estatales

# Corre el dia 25 de cada mes (SHCP suele publicar el dataset el dia 20-22)
on:
  schedule:
    - cron: '0 14 25 * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'Override URL del CSV'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run SHCP transferencias scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TRANSFERENCIAS_URL: ${{ github.event.inputs.url }}
        run: python scripts/scrape_shcp_transferencias.py
      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: shcp_transferencias
          status: ${{ job.status }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
