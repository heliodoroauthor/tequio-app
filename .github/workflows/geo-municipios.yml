name: Geo Enrichment Municipios INEGI

# workflow_dispatch only. Pobla lat/lng/altitud de municipios.
# Idempotente: PATCH por clave_inegi.
on:
  workflow_dispatch:
    inputs:
      max_workers:
        description: 'Threads concurrentes (default 10)'
        required: false
        default: '10'

jobs:
  geo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run geo enrichment
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          MAX_WORKERS: ${{ github.event.inputs.max_workers || '10' }}
        run: python scripts/scrape_inegi_geo_municipios.py

      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: inegi_geo_municipios
          status: ${{ job.status }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
