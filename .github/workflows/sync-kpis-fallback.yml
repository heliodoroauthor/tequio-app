name: 🔄 Sync KPIs Fallback (SEO + crawlers)

# 🦎 Cero Invención · Mantiene los fallbacks HTML hardcoded en index.html
# sincronizados con el cache de Supabase (kpis_globales_cache).

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC = 03:00 CDMX
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python info
        run: |
          python3 --version
          ls -la scripts/sync_kpis_fallback.py

      - name: Run sync (--check)
        id: check
        shell: bash
        run: |
          set +e  # No fail-on-error en este step
          python3 scripts/sync_kpis_fallback.py --check
          EXIT=$?
          echo "exit_code=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "::warning::sync_kpis_fallback exit code $EXIT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Re-run to capture output
          OUT=$(python3 scripts/sync_kpis_fallback.py --check 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -q "NOTE"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply changes
        if: steps.check.outputs.has_changes == 'true'
        run: python3 scripts/sync_kpis_fallback.py

      - name: Commit + push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "::notice::Sin cambios para commit"
            exit 0
          fi
          git commit -m "chore(kpis): sync fallbacks HTML desde kpis_globales_cache

🤖 Workflow sync-kpis-fallback
🦎 Cero Invención · mantiene crawlers SEO + no-JS al día"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" = "true" ]; then
            echo "::notice::✅ Sincronización aplicada"
          else
            echo "::notice::✓ Sin cambios"
          fi
