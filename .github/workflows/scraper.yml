name: Tequio Data Pipeline

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      modulo:
        description: 'Qué scraper correr (all | legal | conagua | banxico | inegi | presas | backfill_embeddings)'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl xlrd==1.2.0

      - name: Legal scraper (DOF + SCJN)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'legal' || github.event.inputs.modulo == '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FUENTE: 'all'
          MAX_PAGINAS: '5'
        run: python scripts/scrape_to_supabase.py
        continue-on-error: true

      - name: CONAGUA v4 scraper
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'conagua' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_conagua_v4.py
        continue-on-error: true

      - name: Banxico scraper (economía)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'banxico' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: python scripts/scrape_banxico.py
        continue-on-error: true

      - name: INEGI scraper (demográficos)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'inegi' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
        run: python scripts/scrape_inegi.py
        continue-on-error: true

      - name: Presas scraper (CONAGUA SIH)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'presas' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_PRESAS: '210'
        run: python scripts/scrape_presas.py
        continue-on-error: true

      # ── Backfill embeddings (manual via workflow_dispatch) ──
      - name: Backfill embeddings (manual)
        if: ${{ github.event.inputs.modulo == 'backfill_embeddings' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/backfill_embeddings.py
