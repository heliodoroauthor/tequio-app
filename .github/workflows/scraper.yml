name: Tequio Data Pipeline

# Corre cada domingo a las 4am UTC (10pm CDMX domingo)
# También se puede correr a mano desde la pestaña Actions
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      modulo:
        description: 'Qué scraper correr (all | legal | conagua | banxico | inegi)'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      # ── Legal: DOF + SCJN (con embeddings Gemini) ──
      - name: Legal scraper (DOF + SCJN)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'legal' || github.event.inputs.modulo == '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FUENTE: 'all'
          MAX_PAGINAS: '5'
        run: python scripts/scrape_to_supabase.py
        continue-on-error: true

      # ── CONAGUA v3: HTML/CSV puro ──
      - name: CONAGUA v3 scraper (HTML + Excel + JSON SINA)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'conagua' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_conagua_v3.py
        continue-on-error: true

      # ── Banxico: tipo de cambio, salario mínimo, inflación ──
      - name: Banxico scraper (economía)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'banxico' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: python scripts/scrape_banxico.py
        continue-on-error: true

      # ── INEGI: población, pobreza, empleo, GDP ──
      - name: INEGI scraper (demográficos)
        if: ${{ github.event.inputs.modulo == 'all' || github.event.inputs.modulo == 'inegi' || github.event.inputs.modulo == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
        run: python scripts/scrape_inegi.py
        continue-on-error: true
