name: Tequio Legal Scraper

# Corre cada lunes a las 4am UTC (10pm hora CDMX domingo)
# También se puede correr manualmente desde la pestaña Actions
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      fuente:
        description: 'Fuente a scrapear (dof | scjn | diputados | all)'
        required: false
        default: 'all'
      max_paginas:
        description: 'Máximo de páginas a scrapear'
        required: false
        default: '5'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FUENTE: ${{ github.event.inputs.fuente || 'all' }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '5' }}
        run: python scripts/scrape_to_supabase.py
