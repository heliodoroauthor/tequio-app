name: Sequía Scraper - Monitor CONAGUA SMN

on:
  schedule:
    # Cada domingo 6am UTC = 12am CDMX. CONAGUA SMN publica los días 15 y último
    # de cada mes, así que correr semanalmente garantiza captura de ambas.
    - cron: '0 6 * * 0'
  workflow_dispatch: {}

jobs:
  scrape-sequia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl cloudscraper urllib3

      - name: Verify env vars
        run: |
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "ERROR: SUPABASE_SERVICE_ROLE_KEY not set in GitHub Secrets"
            exit 1
          fi
          echo "✓ Secret presente"

      - name: Run Sequía scraper
        env:
          SUPABASE_URL: https://mhsuihwjgtzxflesbnxv.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_sequia.py

      - name: Upload diagnostic artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sequia-debug
          path: /tmp/sequia_*.xlsx
          if-no-files-found: ignore
          retention-days: 7
