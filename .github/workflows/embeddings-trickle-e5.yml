name: Embeddings Trickle e5-base (daily)

# Goteo diario: embebe filas nuevas con e5-base (selector embedding_model != 'e5-base').
# Reemplaza al burst de pg_cron (apagado) que llamaba Gemini cada 30s.
# Cron a las 07:00 UTC = 01:00 CDMX (madrugada, baja carga del DB).

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trickle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        table: [leyes_chunks, leyes, politicos_senadores]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-embed-e5-v1
          restore-keys: |
            pip-embed-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-multilingual-e5-base-v1

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests "sentence-transformers>=2.7,<3.0" "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/ || \
          pip install requests "sentence-transformers>=2.7,<3.0" torch

      - name: Trickle ${{ matrix.table }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python3 scripts/backfill_embeddings_e5.py "${{ matrix.table }}" 0 1 --mode=null 2>&1 | tee /tmp/script.log

      - name: ARMADURA v2 - SUMMARY + exit_reason
        if: always()
        run: |
          # v1 (12-jun): detectar silent exit (null bytes + exit 0 sin output)
          # v2 (13-jun): exit_reason=queue_empty obligatorio para verde
          # Status verde = cola REALMENTE vacia, no "proceso terminado"
          if ! grep -q "SUMMARY batch" /tmp/script.log 2>/dev/null; then
            echo "::error::Script NO imprimio SUMMARY - posible silent exit"
            tail -30 /tmp/script.log 2>/dev/null || echo "(no log)"
            exit 1
          fi
          echo "[ARMADURA] SUMMARY presente:"
          grep -A7 "SUMMARY batch" /tmp/script.log | head -12
          EMBEDDED=$(grep -oP "embedded:\s+\K\d+" /tmp/script.log | tail -1 || echo 0)
          PROCESSED=$(grep -oP "processed:\s+\K\d+" /tmp/script.log | tail -1 || echo 0)
          EXIT_REASON=$(grep -oP "exit_reason:\s+\K\w+" /tmp/script.log | tail -1 || echo "missing")
          if [ "$PROCESSED" -gt "0" ] && [ "$EMBEDDED" = "0" ]; then
            echo "::error::Processed=$PROCESSED but embedded=0 (script deberia haber exit 5)"
            exit 1
          fi
          if [ "$EXIT_REASON" != "queue_empty" ]; then
            echo "::error::exit_reason=$EXIT_REASON (esperaba queue_empty)"
            echo "Posibles causas: error en fetch/PATCH tras 3 retries, o no_progress timeout"
            exit 1
          fi
          echo "[ARMADURA v2] processed=$PROCESSED embedded=$EMBEDDED exit_reason=$EXIT_REASON OK"
