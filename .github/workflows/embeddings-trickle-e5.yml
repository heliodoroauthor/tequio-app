name: Embeddings Trickle e5-base (daily)

# Goteo diario: embebe filas nuevas con e5-base (selector embedding_model != 'e5-base').
# Reemplaza al burst de pg_cron (apagado) que llamaba Gemini cada 30s.
# Cron a las 07:00 UTC = 01:00 CDMX (madrugada, baja carga del DB).

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trickle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        table: [leyes_chunks, leyes, politicos_senadores]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-embed-e5-v1
          restore-keys: |
            pip-embed-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-multilingual-e5-base-v1

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests "sentence-transformers>=2.7,<3.0" "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/ || \
          pip install requests "sentence-transformers>=2.7,<3.0" torch

      - name: Trickle ${{ matrix.table }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/backfill_embeddings_e5.py "${{ matrix.table }}" 0 1 --mode=null
