name: SESNSP Incidencia Delictiva Municipal

on:
  schedule:
    - cron: '0 14 22 * *'
  workflow_dispatch:
    inputs:
      anios:
        description: 'Anios a procesar (ej: 2025,2026)'
        required: false
        default: ''
      csv_url:
        description: 'Override URL del archivo (opcional)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl beautifulsoup4 lxml cloudscraper playwright
          python -m playwright install chromium --with-deps

      - name: Run SESNSP scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SESNSP_ANIOS: ${{ github.event.inputs.anios }}
          SESNSP_CSV_URL: ${{ github.event.inputs.csv_url }}
        run: python scripts/scrape_sesnsp_municipios.py

      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: sesnsp_municipios
          status: ${{ job.status }}
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
