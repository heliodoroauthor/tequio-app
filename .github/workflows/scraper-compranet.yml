name: ComprasMX OCDS Weekly

# Corre los domingos a las 04:00 UTC (22:00 CDMX sabado)
# FIX-25 2026-05-21: URLs en buengobierno + 2026 + captura rows_inserted
on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      - name: Run CompraNet scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python scripts/scrape_compranet.py 2>&1 | tee /tmp/scraper.log
      - name: Extract rows
        id: rows
        if: always()
        run: |
          python3 -c "import re,os; t=open('/tmp/scraper.log').read() if os.path.exists('/tmp/scraper.log') else ''; m=re.search(r'rows_inserted=(\d+)', t) or re.search(r'Total insertado:\s+(\d+)', t) or re.search(r'Insertados:\s+(\d+)', t); n = m.group(1) if m else '0'; open(os.environ['GITHUB_OUTPUT'],'a').write(f'rows={n}\n')"
      - name: Log scraper run
        if: always()
        uses: ./.github/actions/log-scraper
        with:
          slug: compranet
          status: ${{ job.status }}
          rows_inserted: ${{ steps.rows.outputs.rows }}
          fuente_url: 'https://upcp-compranet.buengobierno.gob.mx/cnetassets/datos_abiertos_contratos_expedientes/'
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
