name: PROFECO Quien es Quien Weekly

# Corre cada lunes a las 13:00 UTC (07:00 CDMX).
# PROFECO publica actualizaciones semanales, esto las captura un dia despues.
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install --no-save @supabase/supabase-js@2 csv-parse

      - name: Run PROFECO scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/scrape_profeco.js
