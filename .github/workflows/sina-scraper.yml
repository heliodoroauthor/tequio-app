name: 🦎 SINA Scraper - Presas weekly

on:
  schedule:
    # Cada domingo a las 7am UTC = 1am hora CDMX
    - cron: '0 7 * * 0'
  workflow_dispatch:  # también permite correr manual desde Actions UI

jobs:
  scrape-sina:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install chromium --with-deps

      - name: Verify env vars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY in repo secrets"
            exit 1
          fi
          echo "✓ Secret length: ${#SUPABASE_SERVICE_ROLE_KEY}"

      - name: Run SINA scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://mhsuihwjgtzxflesbnxv.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/tequio_sina_scraper.py --verbose

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sina-debug
          path: |
            /tmp/sina_debug.html
            /tmp/sina_screenshot.png
            /tmp/sina_presas_data.json
            /tmp/sina_xhr.log
          retention-days: 7
