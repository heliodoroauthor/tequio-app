name: Backfill Embeddings (manual)

# H2.6-01b auditoria 2026-05-21 — llenar embeddings NULL en leyes y jurisprudencia_scjn
# Disparable a mano desde la pestaña Actions. Requiere los secrets:
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#   - GEMINI_API_KEY

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Por que estas corriendo el backfill (opcional, queda en logs)'
        required: false
        default: 'manual backfill'

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Reason: ${{ inputs.reason }}"
          python scripts/backfill_embeddings.py
